<!DOCTYPE html>
<html>
<head>
    <title>Login - KK Food Donation</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a1f44, #123a7a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 340px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 🔥 NEW TITLE STYLE */
        .title {
            font-size: 22px;
            font-weight: bold;
            color: #0a1f44;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .login-box input:focus {
            border-color: #123a7a;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #0a1f44;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .login-box button:hover {
            background: #123a7a;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #123a7a;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    <!-- 🔥 FIX: TITLE ADDED -->
    <div class="title">KK Food Donation ❤️</div>
    <div class="subtitle">Login to continue</div>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="link">
        Don't have an account? <a href="/signup">Sign up</a>
    </div>

</div>

</body>
</html>
