<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef2f7;
}

/* Header */
.header{
background:#0a2c6b;
color:white;
text-align:center;
padding:40px;
}

/* Navigation bar */
.nav{
background:#102a54;
padding:12px;
text-align:center;
}

.nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

.nav a:hover{
color:#cbd6ff;
}

/* Container */
.container{
width:70%;
margin:auto;
background:white;
padding:40px;
margin-top:30px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* Form styling */
label{
font-weight:bold;
color:#0a2c6b;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:120px;
}

/* Button */
button{
background:#0a2c6b;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#061d47;
}

/* Contact info box */
.info{
margin-top:30px;
background:#f1f5ff;
padding:20px;
border-left:5px solid #0a2c6b;
}

/* Footer */
footer{
background:#0a2c6b;
color:white;
text-align:center;
padding:18px;
margin-top:40px;
}

</style>
</head>

<body>

<div class="header">
<h1>Contact Us</h1>
<p>We would love to hear from you</p>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
<a href="/donate">Donate</a>
<a href="/view">View Donations</a>
</div>

<div class="container">

<h2>Send Us a Message</h2>

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea placeholder="Write your message here"></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">
<h3>Contact Information</h3>
<p><b>Email:</b> fooddonation@gmail.com</p>
<p><b>Phone:</b> +91 9361496869</p>
<p><b>Location:</b> Community Food Support Center</p>
</div>

</div>

<footer>
<p>© 2026 Food Donation System | Helping Communities Together</p>
</footer>

</body>
</html>
