<!DOCTYPE html>
<html>
<head>
    <title>Donate Food</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('/static/images/donate-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .form-container {
            background-color: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 12px;
            width: 400px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e65c00;
        }
        footer {
            text-align: center;
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Food Donation Form</h2>
        <form method="POST" action="/submit">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="food_item" placeholder="Food Item" required>
            <input type="number" name="quantity" placeholder="Quantity" required>
            <textarea name="address" placeholder="Address" rows="3" required></textarea>
            <button type="submit">Donate</button>
        </form>
        <br>
        <a href="/view" style="color:#ffcc66; text-decoration:none;">View Donations</a>
    </div>

    <footer>
        © 2026 Sonali Food Donation | PSGR Krishnmaral College
    </footer>
</body>
</html>
